naftiko: 1.0.0-alpha2
info:
  label: AppOmni SaaS Security Monitoring
  description: Workflow capability for continuous SaaS security monitoring using AppOmni. Supports security teams investigating
    threats, managing policies, and generating compliance reports for enterprise SaaS environments.
  tags:
  - AppOmni
  - SaaS Security
  - Threat Detection
  - Compliance
  created: '2026-04-19'
  modified: '2026-05-06'
binds:
- namespace: env
  keys:
    APPOMNI_API_TOKEN: APPOMNI_API_TOKEN
capability:
  consumes:
  - type: http
    namespace: appomni
    baseUri: https://api.appomni.com/v1
    description: AppOmni SaaS security API
    authentication:
      type: bearer
      token: '{{APPOMNI_API_TOKEN}}'
    resources:
    - name: events
      path: /events
      description: Security events detected across SaaS applications
      operations:
      - name: list-events
        method: GET
        description: Returns security events
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: get-event
        method: GET
        description: Returns a specific security event
        inputParameters:
        - name: eventId
          in: path
          type: string
          required: true
          description: Event identifier
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: policies
      path: /policies
      description: Security policy management
      operations:
      - name: list-policies
        method: GET
        description: Returns security policies
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: compliance-reports
      path: /compliance/reports
      description: Compliance reporting
      operations:
      - name: list-reports
        method: GET
        description: Returns compliance reports
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: mcp
    port: 9090
    namespace: saas-security-mcp
    transport: http
    description: MCP server for AI-assisted SaaS security monitoring with AppOmni.
    tools:
    - name: investigate-security-events
      description: Lists and filters security events across enterprise SaaS applications
      hints:
        readOnly: true
        idempotent: true
      call: appomni.list-events
      outputParameters:
      - type: object
        mapping: $.
    - name: get-event-details
      description: Gets full details of a specific security event for investigation
      hints:
        readOnly: true
        idempotent: true
      call: appomni.get-event
      with:
        eventId: tools.eventId
      outputParameters:
      - type: object
        mapping: $.
    - name: review-security-policies
      description: Reviews security policies configured across monitored SaaS applications
      hints:
        readOnly: true
        idempotent: true
      call: appomni.list-policies
      outputParameters:
      - type: object
        mapping: $.
    - name: get-compliance-reports
      description: Retrieves compliance reports for audit and governance purposes
      hints:
        readOnly: true
        idempotent: true
      call: appomni.list-reports
      outputParameters:
      - type: object
        mapping: $.
